name: Refresh class availability

# Class openings change far faster than court schedules (people enroll daily), so
# the ActiveNet class catalog is re-scraped on its own frequent cadence — separate
# from the weekly full data refresh — committing only the classes data when it
# changes. build:classes self-gates (keeps last-good on a bad/short scrape).

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # scrapes are ~1-2 min; hard-cap so a hung fetch can't burn the runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Re-scrape class availability
        run: npm run build:classes
        env:
          # Optional: pre-translates any *new* class titles to zh/es (Claude Haiku).
          # Absent → build still succeeds, titles stay English. Cache keeps cost ~0.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # NYC's feed is a rolling ~14-day events window, so it goes stale on the
      # same cadence as ActiveNet enrollments. Self-gates like build:classes.
      - name: Re-scrape NYC Parks programs
        run: npm run build:nyc-classes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit refreshed classes if they changed
        run: |
          # i18n cache only exists once a key-enabled run has translated something,
          # so stage just the files that are present; staging catches new files too.
          for f in data/classes.js scripts/classes-cache.json scripts/classes-pass2-cache.json scripts/classes-i18n-cache.json data/cities/nyc/classes.js scripts/cities/nyc-classes-cache.json scripts/cities/nyc-classes-cost-cache.json scripts/cities/nyc-classes-desc-cache.json scripts/cities/nyc-classes-i18n-cache.json; do
            [ -e "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No class changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh class availability"
            git push
          fi
