name: Refresh open-gym schedules

# Re-scrapes the live SF Rec & Park open-gym schedules (sfrecpark.org) and the San
# Bruno RAC gym schedule (Google Sheet), then commits the refreshed data. Schedules
# are seasonal/weekly, so weekly is plenty; the run also self-alerts — if too few
# centers scrape or the San Bruno sheet won't parse, a build script's validation
# gate fails the job and GitHub notifies you.

on:
  schedule:
    - cron: '0 15 * * 1' # Mondays 15:00 UTC (~7–8am PT)
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to commit refreshed data back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # scrapes are ~1-2 min; hard-cap so a hung fetch can't burn the runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape + rebuild court data
        run: npm run build:data
        env:
          # Optional: classifies ambiguous NYC rec-center gym programs and
          # translates new class titles (Claude Haiku). Absent → builds still
          # succeed with conservative/English fallbacks.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit refreshed data if it changed
        run: |
          FILES="data/courts.js data/courts.json scripts/schedule-cache.json data/sanbruno-court.js scripts/sanbruno-cache.json data/outdoor-courts.js scripts/outdoor-courts-cache.json data/cities/nyc/outdoor-courts.js scripts/cities/nyc-cache.json data/cities/nyc/indoor-courts.js scripts/cities/nyc-indoor-cache.json scripts/cities/nyc-indoor-class-cache.json data/cities/nyc/classes.js scripts/cities/nyc-classes-cache.json scripts/cities/nyc-classes-cost-cache.json scripts/cities/nyc-classes-desc-cache.json scripts/cities/nyc-classes-i18n-cache.json data/reservations.js scripts/reservations-cache.json data/court-directory.js scripts/directory-cache.json data/classes.js scripts/classes-cache.json data/pools.js scripts/pools-cache.json"
          if git diff --quiet -- $FILES; then
            echo "No schedule changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "chore: refresh open-gym schedules"
            git push
          fi
