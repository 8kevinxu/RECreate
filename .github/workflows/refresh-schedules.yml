name: Refresh open-gym schedules

# Re-scrapes the live SF Rec & Park open-gym basketball schedules and commits the
# refreshed data/courts.js. Schedules are seasonal, so weekly is plenty; the run
# also self-alerts — if too few centers scrape (e.g. a site redesign), the build
# script's validation gate fails the job and GitHub notifies you.

on:
  schedule:
    - cron: '0 15 * * 1' # Mondays 15:00 UTC (~7–8am PT)
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to commit refreshed data back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape + rebuild court data
        run: npm run build:courts

      - name: Commit refreshed data if it changed
        run: |
          FILES="data/courts.js data/courts.json scripts/schedule-cache.json"
          if git diff --quiet -- $FILES; then
            echo "No schedule changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "chore: refresh open-gym schedules"
            git push
          fi
